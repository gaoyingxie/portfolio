name: Sync Game Versions

on:
  schedule:
    - cron: '0 18 * * *'  # 每天 UTC 18:00 = 北京次日 02:00
  workflow_dispatch:       # 手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch versions and update HTML
        run: |
          python3 << 'PYEOF'
          import subprocess, re, urllib.request, ssl

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE

          def fetch_version(url, pattern):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=10, context=ctx) as r:
                      html = r.read().decode('utf-8', errors='ignore')
                  m = re.search(pattern, html)
                  return m.group(0) if m else None
              except Exception as e:
                  print(f"  fetch error: {e}")
                  return None

          # 抓取各游戏当前版本
          v_hospital   = fetch_version('https://gaoyingxie.github.io/hospital-escape/',  r'v\d+\.\d+')
          v_cloud      = fetch_version('https://gaoyingxie.github.io/cloud-baby/',       r'v\d+\.\d+')
          v_cyber      = fetch_version('https://gaoyingxie.github.io/cyber-cricket/',     r'(?<=class="version">)v\d+\.\d+')
          v_watermelon = 'v1.0'
          v_xiaoxiaole = 'v1.0'

          print(f"医院逃生={v_hospital}, 云养娃={v_cloud}, 赛博斗龙虾={v_cyber}, 合成大西瓜={v_watermelon}, 消消乐={v_xiaoxiaole}")

          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          changed = False

          # 每个游戏有唯一的旧版本号作为锚点，替换其后的 version-badge
          # 结构是: game-card 里有 game-title / version-badge
          replacements = [
              # (游戏卡片class, 旧版本号, 新版本号)
              ('gc-1', 'v5.4',  v_hospital),
              ('gc-2', 'v4.9',  v_cloud),
              ('gc-3', 'v1.0',  v_watermelon),
              ('gc-4', 'v1.0',  v_xiaoxiaole),
              ('gc-5', 'v2.03', v_cyber),
          ]

          for css_class, old_ver, new_ver in replacements:
              if not new_ver or new_ver == old_ver:
                  print(f"  [{css_class}] 无变化 ({old_ver})")
                  continue
              # 定位到该卡片的 version-badge span
              # 匹配: <div class="game-card gc-X ...><...version-badge>旧版本号</span>
              pattern = rf'(<div class="game-card {css_class}"[^>]*>.*?<span class="version-badge">){re.escape(old_ver)}(</span>)'
              replacement = rf'\g<1>{new_ver}\g<2>'
              new_html, n = re.subn(pattern, replacement, html, count=1, flags=re.DOTALL)
              if n:
                  html = new_html
                  changed = True
                  print(f"  [{css_class}] {old_ver} → {new_ver} ✓")
              else:
                  print(f"  [{css_class}] 未找到 {old_ver}，跳过")

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          with open('.git/MERGE_HEAD', 'w') as f:
              pass  # no-op marker

          print("完成" if changed else "无变化")
          PYEOF

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "无变化，跳过提交"
          else
            echo "有变化，提交并推送"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add index.html
            git commit -m "🔄 自动同步游戏版本号"
            git push
          fi
